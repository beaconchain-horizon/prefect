name: ☁️ Prefect Production Pipeline

on:
  push:
    branches: [ main, mine, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  PYTHON_VERSION: '3.11'
  POETRY_VERSION: '1.8.3'
  PREFECT_API_URL: ${{ secrets.PREFECT_API_URL }}

jobs:
  # ============================================================
  # 🔍 مرحله ۱: بررسی کیفیت کد و امنیت
  # ============================================================
  quality-checks:
    name: 🔍 Code Quality & Security
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: 🔧 Install dependencies
        run: |
          poetry install --with dev --no-interaction

      - name: ✅ Run Ruff (linter & formatter)
        run: |
          poetry run ruff check . --output-format=github
          poetry run ruff format . --check

      - name: 🔬 Run type checking (mypy)
        run: |
          poetry run mypy src/ --ignore-missing-imports

      - name: 🧪 Run tests with coverage
        run: |
          poetry run pytest tests/ -v --cov=src/ --cov-report=xml --cov-report=term

      - name: 📊 Upload coverage report
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # ============================================================
  # 🏗️ مرحله ۲: ساخت و بسته‌بندی (Build & Package)
  # ============================================================
  build:
    name: 🏗️ Build & Package
    runs-on: ubuntu-latest
    needs: quality-checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}

      - name: 🔨 Build package
        run: |
          poetry build

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prefect-dist
          path: dist/
          retention-days: 7

  # ============================================================
  # 🚀 مرحله ۳: استقرار (Deploy to Prefect Cloud)
  # ============================================================
  deploy:
    name: 🚀 Deploy to Prefect Cloud
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ secrets.PREFECT_WORKSPACE_URL }}
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}

      - name: 🔧 Install production dependencies
        run: |
          poetry install --only main --no-interaction

      - name: 🔐 Authenticate with Prefect Cloud
        run: |
          poetry run prefect cloud login --key ${{ secrets.PREFECT_API_KEY }}

      - name: 📤 Deploy flows to Prefect Cloud
        run: |
          poetry run prefect deploy --all --yes

      - name: ✅ Verify deployment
        run: |
          poetry run prefect flow ls --limit 5

      - name: 📝 Create deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed Flows:** $(poetry run prefect flow ls --limit 5 | wc -l)" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # 📢 مرحله ۴: ارسال اعلان به دیسکورد
  # ============================================================
  notification:
    name: 📢 Send notification
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: 📢 Discord Notification
        uses: rjstone/discord-webhook-notify@v1
        with:
          severity: ${{ needs.deploy.result == 'success' && 'info' || 'error' }}
          webhookUrl: ${{ secrets.DISCORD_WEBHOOK }}
          text: |
            **${{ github.repository }}**
            🚀 Deployment ${{ needs.deploy.result == 'success' && '✅ SUCCESS' || '❌ FAILED' }}
            📂 Branch: ${{ github.ref_name }}
            🔗 Commit: ${{ github.sha }}
            👤 Actor: ${{ github.actor }}
